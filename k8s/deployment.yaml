apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-practice
  labels:
    app: argocd-practice
spec:
  replicas: 2
  selector:
    matchLabels:
      app: argocd-practice
  template:
    metadata:
      labels:
        app: argocd-practice
    spec:
      containers:
        - name: argocd-practice
          image: argocd-practice:latest   
          ports:
            - containerPort: 8080
